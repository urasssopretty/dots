#	config, @urasssopretty

autorun		= ws[1]:alacritty

#	MONITORS
region	= screen[1]:1600x900+0+0
region	= screen[1]:2560x1080+1600+0
boundary_width 		= 50


#	WORKSPACE AND REGIONS SETTING
workspace_limit		= 6
workspace_clamp		= 1
warp_focus			= 1
warp_pointer		= 1
spawn_position		= next


#	FOCUS SETTING
focus_mode			= manual #follow
focus_close			= previous
focus_close_wrap	= 1
focus_default		= last


#	GAPS
region_padding	= 0
tile_gap		= 0
color_focus		= rgb:70/70/70/


#	BORDERS
border_width		= 2
color_focus_maximized	= rgb:fa/96/96 #rgb:96/be/be
color_unfocus		= rgb:19/19/19/
color_unfocus_maximized	= rgb:88/88/00
	# its for remove border for single window at workspace 
disable_border		= 1


#	BAR SETTING
bar_enabled		= 1
bar_at_bottom		= 0

bar_border_width	= 0
bar_border[1]		= rgb:00/00/00
bar_border_unfocus[1]	= rgb:00/00/00

bar_color[1]		= rgb:19/19/19
bar_color_selected[1]	= rgb:00/00/00

bar_font_color[1]	= rgb:c8/c8/c8
bar_font_color_selected	= rgb:70/70/70
bar_font		= JetBrains Mono:pixelsize=16:antialias=true
bar_font_pua		= Typicons:pixelsize=14:antialias=true

bar_action		= baraction.sh
bar_action_expand	= 0
bar_justify		= center

bar_format		=  +1<+I+2<+C+5< %R 
# bar_format		=  +1<+I+2<+C+5< %R +5<%B, %d +A
# bar_format		= +N:+I +S <+D>+4<%a %b %d %R %Z %Y+8<+A+4<+V

workspace_indicator	= listcurrent,listactive,markcurrent,printnames
stack_enabled		= 1
# clock_enabled		= 1
# clock_format		= %a %b %d %R %Z %Y
iconic_enabled	= 1
maximize_hide_bar	= 0
window_class_enabled	= 0
window_instance_enabled	= 0
window_name_enabled	= 0
verbose_layout		= 1
urgent_enabled		= 1
urgent_collapse	= 0

# Dialog box size ratio when using TRANSSZ quirk; 0.3 < dialog_ratio <= 1.0
dialog_ratio		= 1


#	LAYOUTS
layout		= ws[1]:0:0:0:0:vertical
layout		= ws[2]:0:0:0:0:vertical
layout		= ws[3]:0:0:0:0:fullscreen
layout		= ws[4]:0:0:0:0:vertical
layout		= ws[5]:0:0:0:0:vertical
layout		= ws[6]:0:0:0:0:vertical


# PROGRAMS
program[term]		= alacritty
program[menu]		= rofi -show drun -theme gruvbox-dark
program[lock]		= xlock
# program[menu]		= dmenu_run $dmenu_bottom -fn $bar_font -nb $bar_color -nf $bar_font_color -sb $bar_color_selected -sf $bar_font_color_selected
# program[search]	= dmenu $dmenu_bottom -i -fn $bar_font -nb $bar_color -nf $bar_font_color -sb $bar_color_selected -sf $bar_font_color_selected
# program[name_workspace]	= dmenu $dmenu_bottom -p Workspace -fn $bar_font -nb $bar_color -nf $bar_font_color -sb $bar_color_selected -sf $bar_font_color_selected

# To disable validation of the above, free the respective binding(s):
# bind[]		= MOD+Shift+Delete	# disable lock
# bind[]		= MOD+Shift+Return	# disable term
# bind[]		= MOD+p			# disable menu

# Optional default programs that will only be validated if you override:
# program[screenshot_all]	= screenshot.sh full	# optional
# program[screenshot_wind]	= screenshot.sh window	# optional
# program[initscr]	= initscreen.sh			# optional

# EXAMPLE: Define 'firefox' action and bind to key.
program[firefox]	= firefox http://spectrwm.org/
bind[firefox]		= MOD+Shift+b

# QUIRKS
# Default quirks, remove with: quirk[class:name] = NONE
# type xprop WM_CLASS
#	and click on the intereting window


#	BINDS
#	BAR
bind[bar_toggle]	= MOD+b
bind[bar_toggle_ws]	= MOD+Shift+b

bind[cycle_layout]	= MOD+space
bind[flip_layout]	= MOD+Shift+backslash


# bind[initscr]		= MOD+Shift+i

# bind[master_add]	= MOD+comma
# bind[master_del]	= MOD+period
# bind[master_grow]	= MOD+l
# bind[master_shrink]	= MOD+h

bind[focus_next]	= MOD1+Tab
bind[focus_prev]	= MOD1+Shift+Tab
bind[focus_main]	= MOD+m
bind[focus_urgent]	= MOD+u

#	Layout control
# bind[stack_dec]		= MOD+Shift+period
# bind[stack_inc]		= MOD+Shift+comma
bind[stack_reset]	= MOD+Shift+space

#	BASICS
modkey = Mod4
bind[quit]				= MOD+Mod1+q
bind[restart]			= MOD+r
bind[wind_kill]			= MOD+Shift+i
bind[float_toggle]		= MOD+f
bind[maximize_toggle]	= MOD+m
	# MINIMIZE
bind[iconify]			= MOD+n
bind[uniconify]			= MOD+Shift+n
bind[version]			= MOD+Shift+v

#	PROGRAMS
bind[menu]				= MOD+p
bind[term]				= MOD+Return
bind[swap_main]			= MOD+Shift+Return
bind[screenshot_all]	= MOD+s
bind[screenshot_wind]	= MOD+Shift+s

#	MOVING WINDOWS
bind[swap_next]		= MOD+Shift+j
bind[swap_prev]		= MOD+Shift+k

#	FLOAT WINDOWS FLOAT RESIZING
bind[width_shrink]	= MOD+CONTROL+j
bind[width_grow]	= MOD+CONTROL+k
bind[height_shrink]	= MOD+CONTROL+l
bind[height_grow]	= MOD+CONTROL+semicolon

#	TOGGLE WORKSPACES
bind[ws_1]		= MOD+q
bind[ws_2]		= MOD+w
bind[ws_3]		= MOD+e
bind[ws_4]		= MOD+1
bind[ws_5]		= MOD+2
bind[ws_6]		= MOD+3

#	MOVE WINDOWS BETWEEN WORKSPACES
bind[mvws_1]	= MOD+Shift+q
bind[mvws_2]	= MOD+Shift+w
bind[mvws_3]	= MOD+Shift+e
bind[mvws_4]	= MOD+Shift+1
bind[mvws_5]	= MOD+Shift+2
bind[mvws_6]	= MOD+Shift+3

#	OTHER
bind[ws_prev_all]	= MOD+Left
bind[ws_next_all]	= MOD+Right
bind[ws_prior]		= MOD+a

# bind[rg_move_next]	= MOD+
